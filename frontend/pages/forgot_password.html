<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Trastevere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <script src="{{ url_for('static', filename='i18n.js') }}"></script>
</head>
<body>
<div class="auth-container">
    <div class="auth-logo">
        <span>Trastevere</span>
    </div>
    <h1>Recuperar contraseña</h1>
    <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:20px;text-align:center;">
        Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.
    </p>

    <div id="form-section">
        <label>Email</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com">
        <button class="btn-main" onclick="handleForgot()" style="width:100%;margin-top:8px;">Enviar enlace</button>
    </div>

    <div id="success-section" style="display:none;text-align:center;">
        <div style="font-size:3rem;margin-bottom:16px;">📬</div>
        <p style="color:var(--text);font-weight:700;">¡Email enviado!</p>
        <p style="color:var(--text-muted);font-size:0.88rem;">
            Si existe una cuenta con ese email, recibirás un enlace en unos minutos.
        </p>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:0.88rem;">
        <a href="/auth/login" style="color:var(--primary);font-weight:700;">← Volver al login</a>
    </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', applyLanguage);

async function handleForgot() {
    const email = document.getElementById('email').value.trim();
    if (!email) { alert('Introduce tu email.'); return; }

    const res  = await fetch('/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
    });
    if (res.ok) {
        document.getElementById('form-section').style.display    = 'none';
        document.getElementById('success-section').style.display = 'block';
    } else {
        alert('Error al enviar el email. Inténtalo de nuevo.');
    }
}
</script>
</body>
</html>
