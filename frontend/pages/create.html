<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear receta</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='create.css') }}">

</head>

<body>

{% include 'top_bar.html' %}

<div class="create-container">

<!-- FOTOS -->

<div class="image-grid">

<label class="img-upload large">
<input type="file" accept="image/*">
<span>+</span>
</label>

<div class="right-images">

<label class="img-upload">
<input type="file" accept="image/*">
<span>+</span>
</label>

<label class="img-upload">
<input type="file" accept="image/*">
<span>+</span>
</label>

</div>

</div>

<!-- TITULO -->

<input class="title-input" placeholder="Título de la receta">

<!-- USUARIO -->

<input class="user-input" placeholder="Tu nombre">

<!-- DESCRIPCION -->

<textarea class="description-input" placeholder="Descripción de la receta"></textarea>

<!-- INGREDIENTES -->

<h3>Ingredientes</h3>

<div id="ingredients"></div>

<button onclick="addIngredient()">Añadir ingrediente</button>

<!-- TAGS -->

<h3>Tags</h3>

<input class="tags-input" placeholder="Ej: pasta, italiano, queso">

<!-- PASOS -->

<h3>Pasos (opcional)</h3>

<div id="steps"></div>

<button onclick="addStep()">Añadir paso</button>

<!-- PUBLICAR -->

<button class="publish-btn" onclick="publishRecipe()">Publicar</button>

</div>

{% include 'bottom_bar.html' %}

<script>

function addIngredient(){

const div = document.createElement("div");

div.innerHTML = `<input class="ingredient-input" placeholder="Ingrediente">`;

document.getElementById("ingredients").appendChild(div);

}


function addStep(){

const div = document.createElement("div");

div.innerHTML = `<input class="step-input" placeholder="Paso">`;

document.getElementById("steps").appendChild(div);

}

async function publishRecipe(){
    // 1. Obtenemos el título y creamos el 'slug' (ej: "Pizza Casera" -> "pizza_casera")
    const titleInput = document.querySelector(".title-input").value;
    const slug = titleInput.trim().toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "") // Quita tildes (convierte 'ó' en 'o')
        .replace(/ñ/g, "n")            // Convierte 'ñ' en 'n'
        .replace(/\s+/g, "_")           // Sustituye espacios por _
        .replace(/[^a-z0-9_]/g, "");    // Quita todo lo que no sea letra, número o _

    // 2. Lógica Inteligente de Imágenes:
    // Miramos los tres inputs de archivo (accept="image/*")
    const fileInputs = document.querySelectorAll('input[type="file"]');
    
    // Si el usuario ha seleccionado un archivo en el input 0, usamos su nombre de slug.
    // Si no, usamos la default. (Simulando la subida real).
    const img0 = fileInputs[0].files.length ? `/static/${slug}_1.jpg` : "/static/default_recipe.jpg";
    
    // Repetimos para el hueco 2 y 3.
    const img1 = fileInputs[1].files.length ? `/static/${slug}_2.jpg` : "/static/default_recipe.jpg";
    const img2 = fileInputs[2].files.length ? `/static/${slug}_3.jpg` : "/static/default_recipe.jpg";

    const data = {
        title: titleInput,
        description: document.querySelector(".description-input").value,
        user: document.querySelector(".user-input").value,
        tags: document.querySelector(".tags-input").value.split(","),
        ingredients: [...document.querySelectorAll(".ingredient-input")].map(i => i.value),
        steps: [...document.querySelectorAll(".step-input")].map(s => s.value),
        
        // Guardamos las rutas que hemos decidido
        images: [img0, img1, img2]
    };

    await fetch('/publications/create', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
    });

    alert("Receta publicada");

    window.location.href="/";
}

</script>

</body>
</html>
