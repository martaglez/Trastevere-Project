<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear receta - Trastevere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='create.css') }}">
    
    <style>
        .img-upload {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .img-upload img.preview-img-file {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .plus-icon {
            position: relative;
            z-index: 2;
            font-size: 1.5rem;
            color: #ccc;
        }
        /* Ajuste para que el contenedor de creación respire mejor */
        .create-recipe-card {
            max-width: 800px;
            margin: 20px auto;
            padding: 30px;
        }
    </style>
</head>
<body>

{% include 'top_bar.html' %}

<div class="profile-container create-recipe-card">
    
    <div id="create-logged-view" style="display:none;">
        <h1 class="tables-title" style="margin-bottom: 25px;">Nueva Receta</h1>
        
        <div class="image-grid">
            <label class="img-upload large" id="preview_container_0">
                <input type="file" id="file_0" accept="image/*" onchange="previewImage(0)" style="display:none;">
                <span class="plus-icon"><i class="fas fa-plus"></i></span>
            </label>

            <div class="right-images">
                <label class="img-upload" id="preview_container_1">
                    <input type="file" id="file_1" accept="image/*" onchange="previewImage(1)" style="display:none;">
                    <span class="plus-icon"><i class="fas fa-plus"></i></span>
                </label>
                <label class="img-upload" id="preview_container_2">
                    <input type="file" id="file_2" accept="image/*" onchange="previewImage(2)" style="display:none;">
                    <span class="plus-icon"><i class="fas fa-plus"></i></span>
                </label>
            </div>
        </div>

        <input class="title-input" id="title" placeholder="Título de la receta" required>
        <textarea class="description-input" id="description" placeholder="Cuéntanos sobre tu plato..."></textarea>

        <h3>Ingredientes</h3>
        <div id="ingredients"></div>
        <button onclick="addIngredient()" class="btn-secondary" style="margin-bottom: 20px;">+ Añadir ingrediente</button>

        <h3>Tags</h3>
        <input class="tags-input" id="tags" placeholder="Ej: pasta, italiano, rápido" style="margin-bottom: 20px;">

        <h3>Pasos de preparación</h3>
        <div id="steps"></div>
        <button onclick="addStep()" class="btn-secondary" style="margin-bottom: 30px;">+ Añadir paso</button>

        <button class="publish-btn" onclick="publishRecipe()" style="width: 100%;">Publicar Receta</button>
    </div>

    <div id="create-guest-view" style="display:none; text-align: center; padding: 40px 10px;">
        <div class="profile-pic-section" style="margin-bottom: 30px; border: none;">
            <i class="fas fa-utensils" style="font-size: 6rem; color: var(--primary-color); opacity: 0.3;"></i>
        </div>

        <h2 style="font-size: 2rem; color: #333; margin-bottom: 15px;">¡Comparte tu talento!</h2>
        <p style="color: #666; margin-bottom: 40px; font-size: 1.1rem; max-width: 450px; margin-left: auto; margin-right: auto;">
            Inicia sesión para subir tus propias recetas y que toda la comunidad de Trastevere pueda disfrutarlas.
        </p>
        
        <div class="profile-actions" style="display: flex; flex-direction: column; gap: 15px; max-width: 320px; margin: 0 auto;">
            <button onclick="window.location.href='/auth/login'" class="btn-main" style="width: 100%; padding: 12px;">
                Iniciar Sesión
            </button>
            <button onclick="window.location.href='/auth/register'" style="background: white; color: var(--primary-color); border: 2px solid var(--primary-color); border-radius: 8px; padding: 12px; cursor: pointer; font-weight: bold; width: 100%;">
                Crear cuenta gratis
            </button>
        </div>
    </div>
</div>

{% include 'bottom_bar.html' %}

<script>
// VERIFICACIÓN DE SESIÓN AL CARGAR
async function checkAccess() {
    try {
        const response = await fetch('/user/profile');
        if (response.status === 401) {
            document.getElementById('create-guest-view').style.display = 'block';
            document.getElementById('create-logged-view').style.display = 'none';
        } else {
            document.getElementById('create-logged-view').style.display = 'block';
            document.getElementById('create-guest-view').style.display = 'none';
            // Inicializar con un campo vacío si está logueado
            addIngredient();
            addStep();
        }
    } catch (error) {
        document.getElementById('create-guest-view').style.display = 'block';
    }
}

function previewImage(index) {
    const fileInput = document.getElementById(`file_${index}`);
    const container = document.getElementById(`preview_container_${index}`);
    const plusIcon = container.querySelector('.plus-icon');

    if (fileInput.files && fileInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const oldImg = container.querySelector('.preview-img-file');
            if (oldImg) oldImg.remove();
            plusIcon.style.opacity = '0';
            const img = document.createElement('img');
            img.src = e.target.result;
            img.className = 'preview-img-file';
            container.appendChild(img);
        }
        reader.readAsDataURL(fileInput.files[0]);
    }
}

function addIngredient() {
    const div = document.createElement("div");
    div.className = "dynamic-input-container";
    div.innerHTML = `<input class="ingredient-input" placeholder="Cantidad e ingrediente" style="width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 5px; border: 1px solid #ddd;">`;
    document.getElementById("ingredients").appendChild(div);
}

function addStep() {
    const div = document.createElement("div");
    div.className = "dynamic-input-container";
    div.innerHTML = `<input class="step-input" placeholder="Describe el paso" style="width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 5px; border: 1px solid #ddd;">`;
    document.getElementById("steps").appendChild(div);
}

async function publishRecipe() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const tagsRaw = document.getElementById("tags").value;
    const tagsArray = tagsRaw.split(',').map(t => t.trim()).filter(t => t !== "");

    if (!title || !description) {
        alert("Por favor, rellena al menos el título y la descripción.");
        return;
    }

    const formData = new FormData();
    formData.append('title', title);
    formData.append('description', description);
    formData.append('tags', JSON.stringify(tagsArray));

    const ingredients = [...document.querySelectorAll(".ingredient-input")].map(i => i.value).filter(v => v !== "");
    const steps = [...document.querySelectorAll(".step-input")].map(s => s.value).filter(v => v !== "");
    
    formData.append('ingredients', JSON.stringify(ingredients));
    formData.append('steps', JSON.stringify(steps));

    for (let i = 0; i < 3; i++) {
        const fileInput = document.getElementById(`file_${i}`);
        if (fileInput && fileInput.files.length > 0) {
            formData.append(`file_${i}`, fileInput.files[0]);
        }
    }

    try {
        const response = await fetch('/publications/create', {
            method: 'POST',
            body: formData
        });
        const result = await response.json();
        if (response.ok) {
            alert("¡Receta subida con éxito!");
            window.location.href = "/";
        } else {
            alert("Error: " + (result.error || "No se pudo publicar"));
        }
    } catch (error) {
        console.error("Error al publicar:", error);
    }
}

window.onload = checkAccess;
</script>

</body>
</html>
