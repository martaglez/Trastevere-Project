<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Trastevere</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <div class="auth-container">
        <h1>Crear Cuenta</h1>
        
        <label>Usuario <span style="color:red">*</span></label>
        <input type="text" id="username" placeholder="Tu nombre de usuario">

        <label>Email <span style="color:red">*</span></label>
        <input type="email" id="email" placeholder="correo@ejemplo.com">

        <label>Contraseña <span style="color:red">*</span></label>
        <input type="password" id="password" placeholder="Contraseña segura">

        <hr style="border: 0.5px solid #eee; margin: 20px 0;">

        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 15px;">
            <input type="checkbox" id="want-premium" style="width: auto; margin: 0;" onchange="toggleFields()">
            <label for="want-premium" style="font-weight: bold; color: var(--primary-color);">
                Activar Plan Premium
            </label>
        </div>

        <div id="personal-data">
            <label>DNI <span id="star-dni" style="color:red">*</span></label>
            <input type="text" id="dni" placeholder="12345678Z">

            <label>Teléfono <span id="star-phone" style="color:red">*</span></label>
            <input type="text" id="phone" placeholder="600000000">
        </div>

        <div id="premium-fields" style="display: none;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Número de Tarjeta <span style="color:red">*</span></label>
            <input type="text" id="card_number" placeholder="1234 5678 1234 5678" maxlength="16">
            <small style="color: #888; font-size: 0.75rem; display: block; margin-top: 5px;">
                DNI y Teléfono opcionales para el Plan Premium.
            </small>
        </div>

        <button onclick="handleRegister()" class="btn-main" style="margin-top: 20px;">Registrarse</button>
        <p>¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a></p>
    </div>

    <script>
        function toggleFields() {
            const isPremium = document.getElementById('want-premium').checked;
            const premiumBox = document.getElementById('premium-fields');
            const starDni = document.getElementById('star-dni');
            const starPhone = document.getElementById('star-phone');

            if (isPremium) {
                premiumBox.style.display = 'block';
                starDni.style.display = 'none'; // Opcional en Premium
                starPhone.style.display = 'none'; // Opcional en Premium
            } else {
                premiumBox.style.display = 'none';
                starDni.style.display = 'inline'; // Obligatorio en Basic
                starPhone.style.display = 'inline'; // Obligatorio en Basic
            }
        }

        async function handleRegister() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const dni = document.getElementById('dni').value;
            const phone = document.getElementById('phone').value;
            const wantPremium = document.getElementById('want-premium').checked;
            const cardNumber = document.getElementById('card_number').value;

            // Validación de obligatorios (Username, Email, Pass siempre)
            if (!username || !email || !password) {
                alert("Rellena los campos obligatorios del usuario.");
                return;
            }

            // Validación si es BASIC
            if (!wantPremium && (!dni || !phone)) {
                alert("DNI y Teléfono son obligatorios para el plan gratuito.");
                return;
            }

            // Validación si es PREMIUM
            if (wantPremium && !cardNumber) {
                alert("Introduce tu tarjeta para activar el plan Premium.");
                return;
            }

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: username,
                        email: email, 
                        password: password, 
                        dni: dni || null,
                        phone_number: phone || null,
                        wantPremium: wantPremium,
                        card_number: wantPremium ? cardNumber : null
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    alert("¡Bienvenido a Trastevere!");
                    window.location.href = "{{ url_for('auth.login') }}";
                } else {
                    alert("Error: " + data.error);
                }
            } catch (error) {
                alert("Error en la conexión con el servidor");
            }
        }
    </script>
</body>
</html>
