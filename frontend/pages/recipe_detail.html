<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de receta - Trastevere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='recipe_detail.css') }}">
</head>
<body>

{% include 'top_bar.html' %}

<div class="recipe-detail" id="recipe-detail">
    </div>

{% include 'bottom_bar.html' %}

<script>
async function loadRecipe() {
    const path = window.location.pathname.split('/');
    const id = path[path.length - 1];

    const response = await fetch('/publications/' + id);
    const data = await response.json();

    const container = document.getElementById('recipe-detail');

    if(data.error){
        container.innerHTML = '<p style="text-align:center; margin-top:50px;">Receta no encontrada</p>';
        return;
    }

    // 1. Gestión de imágenes
    const photos = data.images || [];
    const img1 = photos[0] || '/storage/images/default_photo.jpg';
    const img2 = photos[1] || '/storage/images/default_photo.jpg';
    const img3 = photos[2] || '/storage/images/default_photo.jpg';

    // 2. Renderizado (HE ELIMINADO EL BLOQUE DUPLICADO DE TAGS)
    container.innerHTML = `
    <div class="image-grid">
        <img src="${img1}" 
             onerror="this.src='/storage/images/default_photo.jpg';" 
             class="img-large">

        <div class="img-right">
            <img src="${img2}" onerror="this.src='/storage/images/default_photo.jpg';">
            <img src="${img3}" onerror="this.src='/storage/images/default_photo.jpg';">
        </div>
    </div>

    <div class="recipe-content">
        <div class="save-container" style="margin-bottom:15px;">
            <button class="save-btn" onclick="openTableModal()">
                <i class="fas fa-bookmark"></i> Guardar en Table
            </button>
        </div>

        <div id="table-modal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close" onclick="closeTableModal()">&times;</span>
                <h3>Selecciona una table</h3>
                <div id="modal-tables-container"></div>
            </div>
        </div>

        <h1 style="color: var(--primary-color);">${data.title}</h1>

        <p class="user"><i class="fas fa-user-circle"></i> Por ${data.author || "Cocinero Anónimo"}</p>

        <p class="description">${data.description || "Sin descripción disponible."}</p>

        <div style="display: flex; gap: 40px; margin-top: 30px;">
            <div style="flex: 1;">
                <h3 style="color: var(--primary-color);"><i class="fas fa-list-ul"></i> Ingredientes</h3>
                <ul>
                    ${(data.ingredients || []).map(i => `<li>${i}</li>`).join("")}
                </ul>
            </div>
            <div style="flex: 1;">
                <h3 style="color: var(--primary-color);"><i class="fas fa-utensils"></i> Pasos</h3>
                <ol>
                    ${(data.steps || []).map(s => `<li>${s}</li>`).join("")}
                </ol>
            </div>
        </div>

        <div class="tags" style="margin-top: 20px;">
            ${(data.tags && data.tags.length > 0) 
                ? [...new Set(data.tags)].map(tag => `<span class="tag">#${tag}</span>`).join("") 
                : ""}
        </div>
    </div>
    `;
}

loadRecipe();

// --- LÓGICA DE TABLES ---
async function openTableModal(){
    const res = await fetch('/user/profile');
    if (res.status === 401) {
        alert("Inicia sesión para guardar recetas");
        window.location.href = "/auth/login";
        return;
    }

    const tablesRes = await fetch('/tables/'); 
    const tablesList = await tablesRes.json();

    const modalContainer = document.getElementById('modal-tables-container');
    modalContainer.innerHTML = "";

    if(!tablesList || tablesList.length === 0){
        modalContainer.innerHTML = "<p>No tienes tables aún.</p><button onclick='window.location.href=\"/tables\"' class='btn-main'>Crear mi primera Table</button>";
    } else {
        tablesList.forEach(t => {
            const btn = document.createElement("button");
            btn.className = "modal-table-btn";
            btn.innerText = t.name;
            btn.onclick = () => saveToTable(t.id, t.name);
            modalContainer.appendChild(btn);
        });
    }

    document.getElementById('table-modal').style.display = 'flex';
}

function closeTableModal(){
    document.getElementById('table-modal').style.display = 'none';
}

async function saveToTable(tableId, tableName){
    const path = window.location.pathname.split('/');
    const pubId = path[path.length - 1];

    const response = await fetch('/tables/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            table_id: tableId,
            publication_id: parseInt(pubId)
        })
    });

    if(response.ok) {
        alert(`¡Guardado en "${tableName}"!`);
        closeTableModal();
    } else {
        alert("Esta receta ya está en esa Table.");
    }
}
</script>

</body>
</html>
