<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Trastevere</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <span>Trastevere</span>
        </div>
        <h1>Bienvenido</h1>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com" required>

        <label for="pass">Contraseña</label>
        <input type="password" id="pass" placeholder="Tu contraseña" required>

        <button onclick="handleLogin()" class="btn-main">Entrar</button>

        <p>¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate gratis</a></p>
    </div>

    <script>
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await response.json();
        if (response.ok) {
            window.location.href = '/';
        } else {
            alert('Error: ' + data.error);
        }
    }

    // Permitir Enter en los campos
    document.addEventListener('keypress', e => {
        if (e.key === 'Enter') handleLogin();
    });
    </script>
</body>
</html>
