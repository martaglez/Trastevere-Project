<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contenido de la Table - Trastevere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="apple-touch-icon" href="/storage/images/touch-icon.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='table_detail.css') }}">
    <script src="{{ url_for('static', filename='i18n.js') }}"></script>
</head>
<body>

{% include 'top_bar.html' %}

<div class="table-detail-header">
    <h1 id="table-name"></h1>
    <p id="recipe-count"></p>
</div>

<div class="feed-container" id="recipes"></div>

{% include 'bottom_bar.html' %}

<script>
async function loadTable(){
    const path = window.location.pathname.split('/');
    const id = path[path.length-1];

    const res = await fetch('/tables/' + id);
    const data = await res.json();

    document.getElementById("table-name").innerText = data.name;
    const container = document.getElementById("recipes");
    container.innerHTML = "";

    if (!data.publications || data.publications.length === 0) {
        container.innerHTML = "<p class='empty-msg'>Aún no hay recetas guardadas aquí.</p>";
        return;
    }

    document.getElementById("recipe-count").innerText = data.publications.length + " " + t("tables.saved");

    data.publications.forEach(pub => {
        const card = document.createElement("div");
        card.className = "recipe-card";

        // Usamos la imagen real que viene del backend
        const imgPath = pub.image || "/storage/images/default_photo.jpg";

        card.innerHTML = `
            <img src="${imgPath}" class="recipe-img" onerror="this.src='/storage/images/default_photo.jpg'">
            <div class="recipe-info-container">
                <h3>${pub.title}</h3>
                <button class="remove-recipe-btn" onclick="removeFromTable(${pub.id}); event.stopPropagation();">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>
        `;

        card.onclick = () => { window.location.href = "/publications/view/" + pub.id; };
        container.appendChild(card);
    });
}

async function removeFromTable(publicationId){
    const path = window.location.pathname.split('/');
    const tableId = path[path.length-1];
    if (!confirm("¿Quitar esta receta de la table?")) return;

    await fetch('/tables/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            table_id: parseInt(tableId),
            publication_id: publicationId
        })
    });
    loadTable();
}

window.onload = loadTable;
</script>
</body>
</html>
