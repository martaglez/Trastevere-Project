<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Trastevere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="apple-touch-icon" href="/storage/images/touch-icon.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
    <script src="{{ url_for('static', filename='i18n.js') }}"></script>
</head>
<body>
    {% include 'top_bar.html' %}

    <div class="profile-container">

        <!-- Vista logueado -->
        <div id="logged-in-view" style="display:none;">
            <div class="profile-pic-section">
                <img id="user-pic" src="/storage/images/default_user.jpg"
                     alt="Foto de perfil" class="profile-pic">
                <p class="profile-pic-hint" data-i18n="profile.picHint">Toca tu foto para cambiarla</p>
                <input type="file" id="pic-input" style="display:none;" accept="image/*">
            </div>

                        <h2 id="user-name" style="margin-top: 10px; text-align: center; color: var(--primary-color);"></h2>

            <!-- Stats sociales -->
            <div class="profile-social-stats" id="profile-stats" style="display:none;">
                <div class="profile-stat" onclick="window.location.href='/user/'+_myUserId">
                    <span class="profile-stat-num" id="stat-pubs">0</span>
                    <span class="profile-stat-label" data-i18n="profile.recipes">Recetas</span>
                </div>
                <div class="profile-stat-divider"></div>
                <div class="profile-stat">
                    <span class="profile-stat-num" id="stat-followers">0</span>
                    <span class="profile-stat-label" data-i18n="profile.followers">Seguidores</span>
                </div>
                <div class="profile-stat-divider"></div>
                <div class="profile-stat">
                    <span class="profile-stat-num" id="stat-following">0</span>
                    <span class="profile-stat-label" data-i18n="profile.following">Siguiendo</span>
                </div>
                <div class="profile-stat-divider"></div>
                <div class="profile-stat">
                    <span class="profile-stat-num" id="stat-stars">0.0</span>
                    <span class="profile-stat-label" data-i18n="profile.stars">⭐ Estrellas</span>
                </div>
            </div>

            <div class="profile-info">
                <p><strong data-i18n="profile.email">Email</strong> <span id="user-email"></span></p>
                <p><strong data-i18n="profile.phone">Teléfono</strong> <input id="user-phone" disabled data-i18n-placeholder="profile.phonePh" placeholder="Sin configurar" class="profile-input"></p>
                <p><strong data-i18n="profile.dni">DNI</strong> <input id="user-dni" disabled data-i18n-placeholder="profile.phonePh" placeholder="Sin configurar" class="profile-input"></p>
                <p><strong data-i18n="profile.plan">Plan</strong> <span id="user-sub"></span></p>
            </div>

            <div class="profile-actions">
                <button onclick="enableEdit()"><i class="fas fa-edit"></i> <span data-i18n="profile.edit">Editar</span></button>
                <button onclick="if(_myUserId)window.location.href='/user/'+_myUserId"><i class="fas fa-eye"></i> <span data-i18n="profile.myProfile">Mi perfil</span></button>
                <button onclick="openAbout()"><i class="fas fa-info-circle"></i> <span data-i18n="profile.info">Info</span></button>
                <button style="background:#888;" onclick="window.location.href='/auth/logout'">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="profile.logout">Salir</span>
                </button>
            </div>

            <div style="text-align:center;margin-top:14px;">
                <button id="save-btn" style="display:none;" onclick="saveProfile()" class="btn-main" data-i18n="profile.saveChanges">
                    Guardar cambios
                </button>
            </div>
        </div>

        <!-- Vista invitado -->
        <div id="guest-view" style="display:none;text-align:center;padding:40px 10px;">
            <i class="fas fa-utensils" style="font-size:3.5rem;color:var(--primary);opacity:0.3;"></i>
            <h2 style="font-size:1.5rem;margin:20px 0 10px;"><span data-i18n="profile.joinTitle">¡Únete a Trastevere!</span></h2>
            <p style="color:var(--text-muted);margin-bottom:28px;" data-i18n="profile.joinSub">Crea tu red de recetas y guarda tus favoritos.</p>
            <div style="display:flex;flex-direction:column;gap:10px;max-width:280px;margin:0 auto;">
                <button onclick="window.location.href='/auth/login'" class="btn-main" data-i18n="profile.login">Iniciar Sesión</button>
                <button onclick="window.location.href='/auth/register'" class="btn-secondary" data-i18n="profile.createAccount">Crear cuenta gratis</button>
            </div>
        </div>
    </div>

    <!-- About box -->
    <div id="about-box" style="display:none;">
        <h3 data-i18n="profile.aboutTitle">Trastevere App</h3>
        <p><strong data-i18n="profile.version">Versión:</strong> <span id="about-version"></span></p>
        <p><strong data-i18n="profile.build">Build:</strong> <span id="about-build"></span></p>
        <p><strong data-i18n="profile.authors">Autores:</strong> <span id="about-authors"></span></p>
        <button onclick="closeAbout()" class="btn-main" style="margin-top:12px;" data-i18n="profile.close">Cerrar</button>
    </div>

    {% include 'bottom_bar.html' %}

    <script>
    let _myUserId = null;

    async function loadProfile() {
        try {
            const response = await fetch('/user/profile');
            if (response.status === 401) {
                document.getElementById('guest-view').style.display = 'block';
                return;
            }
            const user = await response.json();
            document.getElementById('logged-in-view').style.display = 'block';
            document.getElementById('user-name').innerText  = user.username;

            // Stats sociales
            _myUserId = user.id;
            fetch('/profiles/' + user.id).then(r=>r.json()).then(p=>{
                document.getElementById('stat-pubs').textContent      = p.pub_count      || 0;
                document.getElementById('stat-followers').textContent  = p.follower_count || 0;
                document.getElementById('stat-following').textContent  = p.following_count|| 0;
                document.getElementById('stat-stars').textContent      = (p.stars||0).toFixed(1);
                document.getElementById('profile-stats').style.display = 'flex';
            }).catch(()=>{});
            document.getElementById('user-email').innerText = user.email;
            document.getElementById('user-phone').value = user.phone_number || '';
            document.getElementById('user-dni').value   = user.dni || '';

            // Badge plan
            const planEl = document.getElementById('user-sub');
            planEl.innerHTML = user.plan === 'PREMIUM'
                ? `<span class="plan-badge premium">✨ Premium</span>`
                : `<span class="plan-badge basic">Basic</span>`;

            document.getElementById('user-pic').src = user.profile_pic || '/storage/images/default_user.jpg';
        } catch (e) {
            console.error('Error cargando perfil:', e);
        }
    }

    function enableEdit() {
        document.getElementById('user-phone').disabled = false;
        document.getElementById('user-dni').disabled   = false;
        document.getElementById('user-phone').focus();
        document.getElementById('save-btn').style.display = 'inline-block';
    }

    async function saveProfile() {
        const data = {
            phone_number: document.getElementById('user-phone').value,
            dni: document.getElementById('user-dni').value
        };
        const response = await fetch('/user/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (response.ok) {
            alert(t('profile.updated'));
            window.location.reload();
        }
    }

    // Cambio de foto
    document.getElementById('user-pic').onclick = () => document.getElementById('pic-input').click();
    document.getElementById('pic-input').onchange = async function() {
        const file = this.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('profile_pic', file);
        const response = await fetch('/user/upload_pic', { method: 'POST', body: formData });
        if (response.ok) {
            const data = await response.json();
            document.getElementById('user-pic').src = data.url;
        } else {
            alert(t('profile.uploadError'));
        }
    };

    async function openAbout() {
        const response = await fetch('/user/about');
        const data = await response.json();
        document.getElementById('about-version').innerText = data.version;
        document.getElementById('about-build').innerText   = data.build;
        document.getElementById('about-authors').innerText = data.authors;
        document.getElementById('about-box').style.display = 'block';
    }

    function closeAbout() {
        document.getElementById('about-box').style.display = 'none';
    }

    window.onload = loadProfile;
    </script>
</body>
</html>
