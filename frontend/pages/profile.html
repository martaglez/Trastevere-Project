<!DOCTYPE html>
<html lang="es">
<head>
    <title>Perfil de Usuario - Trastevere</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
</head>
<body>
    {% include 'top_bar.html' %}   

    <div class="profile-container">
        <div class="profile-pic-section">
            <img id="user-pic" src="/static/default_user.jpg" alt="Foto de perfil" class="profile-pic">
        
            <div id="edit-pic-container" style="display:none;">
                <input type="file" id="upload-pic" accept="image/*" style="display:none">
                
                <button onclick="document.getElementById('upload-pic').click()">
                    Cambiar foto
                </button>
            </div>
        </div>
        
        <h2 id="user-name">Cargando nombre...</h2>
        
        <div class="profile-info">
            <p><strong>Email:</strong> <span id="user-email">Cargando...</span></p>
            <p><strong>Teléfono:</strong> <input id="user-phone" disabled></p>
            <p><strong>DNI:</strong> <input id="user-dni" disabled></p>
            <p><strong>Suscripción:</strong> <span id="user-sub" style="font-weight: bold; color: var(--primary-color);"></span></p>
        </div>

        <div class="profile-actions">
            <button onclick="enableEdit()">Editar Perfil</button>
            <button onclick="openAbout()">About</button>
            <button style="background-color: #666;" onclick="window.location.href='/auth/logout'">Cerrar Sesión</button>
        </div>
        <div style="text-align:center; margin-top:15px;">
            <button id="save-btn" style="display:none;" onclick="saveProfile()">Guardar cambios</button>
        </div>
    </div>

    <div id="about-box" style="display:none; background:white; padding:20px; border-radius:10px; margin:20px auto; max-width:400px; text-align:center;">
        <h3>Acerca de la aplicación</h3>
        <p><strong>Versión:</strong> <span id="about-version"></span></p>
        <p><strong>Build:</strong> <span id="about-build"></span></p>
        <p><strong>Autores:</strong> <span id="about-authors"></span></p>
    
        <button onclick="closeAbout()">Cerrar</button>
    </div>

    {% include 'bottom_bar.html' %}

    <script>
        async function loadProfile() {
            try {
                // Llamamos al endpoint
                const response = await fetch('/user/profile');
                if (!response.ok) throw new Error("No se pudo obtener el perfil");
                
                const user = await response.json();
                
                // Mapeamos los datos del JSON a los elementos del HTML
                document.getElementById('user-name').innerText = user.name;
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-phone').value = user.phone;
                document.getElementById('user-dni').value = user.dni;
                document.getElementById('user-sub').innerText = user.subscription.toUpperCase();
                
                // Si se puso una foto, la usamos, si no, se queda la de por defecto
                if (user.profile_pic && user.profile_pic !== "foto.jpg") {
                    document.getElementById('user-pic').src = "/static/" + user.profile_pic;
                }
            } catch (error) {
                console.error("Error al cargar datos del perfil:", error);
            }
        }

        function enableEdit() {
            document.getElementById('user-phone').disabled = false;
            document.getElementById('user-dni').disabled = false;

            document.getElementById('save-btn').style.display = 'inline-block';
            document.getElementById('edit-pic-container').style.display = 'block';
        }

        async function saveProfile() {
            try {
                const updatedData = {
                    phone: document.getElementById('user-phone').value,
                    dni: document.getElementById('user-dni').value
                };

                const response = await fetch('/user/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(updatedData)
                });

                const result = await response.json();

                // Bloquear otra vez los inputs
                document.getElementById('user-phone').disabled = true;
                document.getElementById('user-dni').disabled = true;

                document.getElementById('edit-pic-container').style.display = 'none';
                document.getElementById('save-btn').style.display = 'none';

                alert("Perfil actualizado correctamente");

            } catch (error) {
                console.error("Error al guardar:", error);
            }
        }

        // Ejecutar al cargar la página
        window.onload = loadProfile;

        async function openAbout() {
            try {
                const response = await fetch('/user/about');
                const data = await response.json();

                document.getElementById('about-version').innerText = data.version;
                document.getElementById('about-build').innerText = data.build;
                document.getElementById('about-authors').innerText = data.authors;

                document.getElementById('about-box').style.display = 'block';
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function closeAbout() {
            document.getElementById('about-box').style.display = 'none';
        }

        document.getElementById('upload-pic').addEventListener('change', uploadProfilePic);

        async function uploadProfilePic() {
            const fileInput = document.getElementById('upload-pic');
            const file = fileInput.files[0];

            if (!file) return;

            const formData = new FormData();
            formData.append('profile_pic', file);

            try {
                const response = await fetch('/user/upload_pic', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                // actualizar imagen en pantalla
                document.getElementById('user-pic').src = "/static/" + data.filename;

            } catch (error) {
                console.error("Error subiendo imagen:", error);
            }
        }
    </script>
</body>
</html>
