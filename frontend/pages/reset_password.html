<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña - Trastevere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <script src="{{ url_for('static', filename='i18n.js') }}"></script>
</head>
<body>
<div class="auth-container">
    <div class="auth-logo"><span>Trastevere</span></div>

    {% if valid %}
    <h1>Nueva contraseña</h1>
    <div id="form-section">
        <label>Nueva contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        <label>Repetir contraseña</label>
        <input type="password" id="password2" placeholder="Repite la contraseña">
        <button class="auth-btn" onclick="handleReset()">Guardar contraseña</button>
    </div>
    <div id="success-section" style="display:none;text-align:center;">
        <div style="font-size:3rem;margin-bottom:16px;">✅</div>
        <p style="font-weight:700;color:var(--text);">¡Contraseña actualizada!</p>
        <a href="/auth/login" style="display:inline-block;margin-top:16px;padding:10px 24px;
           background:var(--primary);color:white;border-radius:10px;text-decoration:none;font-weight:700;">
            Iniciar sesión →
        </a>
    </div>
    {% else %}
    <div style="text-align:center;padding:20px 0;">
        <div style="font-size:3rem;margin-bottom:16px;">⚠️</div>
        <h2>Enlace inválido o expirado</h2>
        <p style="color:var(--text-muted);">El enlace de recuperación no es válido o ha expirado (1 hora).</p>
        <a href="/auth/forgot-password" style="display:inline-block;margin-top:16px;padding:10px 24px;
           background:var(--primary);color:white;border-radius:10px;text-decoration:none;font-weight:700;">
            Solicitar nuevo enlace
        </a>
    </div>
    {% endif %}
</div>

<script>
document.addEventListener('DOMContentLoaded', applyLanguage);

async function handleReset() {
    const pw  = document.getElementById('password').value;
    const pw2 = document.getElementById('password2').value;
    if (pw.length < 6)  { alert('La contraseña debe tener al menos 6 caracteres.'); return; }
    if (pw !== pw2)     { alert('Las contraseñas no coinciden.'); return; }

    const res = await fetch('/auth/reset-password/{{ token }}', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
    });
    const data = await res.json();
    if (res.ok) {
        document.getElementById('form-section').style.display    = 'none';
        document.getElementById('success-section').style.display = 'block';
    } else {
        alert('Error: ' + (data.error || 'No se pudo actualizar la contraseña.'));
    }
}
</script>
</body>
</html>
