<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscar recetas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='search.css') }}">
</head>
<body>

{% include 'top_bar.html' %}

<div class="search-container">

    <input type="text" id="search-input" placeholder="Buscar por tags o ingredientes...">
    <button id="search-btn">Buscar</button>

</div>

<div id="search-results" class="feed-container"></div>

{% include 'bottom_bar.html' %}

<script>
async function searchRecipes() {
    const query = document.getElementById('search-input').value.toLowerCase();

    const res = await fetch('/publications/all');
    const publications = await res.json();

    const results = publications.filter(pub => {
        const tagsMatch = pub.tags.some(t => t.toLowerCase().includes(query));
        const ingredientsMatch = pub.ingredients.some(i => i.toLowerCase().includes(query));
        return tagsMatch || ingredientsMatch;
    });

    const container = document.getElementById('search-results');
    container.innerHTML = "";

    results.forEach(pub => {
        const card = document.createElement("div");
        card.className = "recipe-card";
        card.innerHTML = `
            <img src="${pub.images[0] || '/static/default_recipe.jpg'}" class="recipe-img">
            <div class="recipe-info">
                <h3>${pub.title}</h3>
            </div>
        `;
        card.onclick = () => {
            window.location.href = "/publications/view/" + pub.id;
        };
        container.appendChild(card);
    });
}

document.getElementById('search-btn').addEventListener('click', searchRecipes);

// opcional: búsqueda al presionar Enter
document.getElementById('search-input').addEventListener('keypress', function(e) {
    if(e.key === 'Enter') searchRecipes();
});
</script>

</body>
</html>
