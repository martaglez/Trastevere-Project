<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar - Trastevere</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="apple-touch-icon" href="/storage/images/touch-icon.png">
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='search.css') }}">
    <script src="{{ url_for('static', filename='i18n.js') }}"></script>
</head>
<body>

{% include 'top_bar.html' %}

<section class="search-hero">
    <div class="search-box">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search-input"
               placeholder="Buscar recetas o @usuarios..." data-i18n-placeholder="search.placeholder"
               onfocus="showHistory()" oninput="showHistory()">
        <button id="search-btn" onclick="doSearch()" data-i18n="search.btn">Buscar</button>
    </div>
    <div id="search-history" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;
                    padding:8px 16px 4px;border-bottom:1px solid var(--border);">
            <span style="font-size:0.72rem;font-weight:700;text-transform:uppercase;
                         letter-spacing:0.06em;color:var(--text-muted);"
                  data-i18n="search.history">Búsquedas recientes</span>
            <button onclick="clearHistory()" style="background:none;border:none;font-size:0.75rem;
                    color:var(--primary);cursor:pointer;font-weight:600;"
                    data-i18n="search.clearHistory">Borrar</button>
        </div>
        <div id="history-list"></div>
    </div>
</section>

<!-- Tags populares -->
<div id="tags-section" style="padding:8px 16px 4px;max-width:800px;margin:0 auto;">
    <p style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;
              color:var(--text-muted);margin-bottom:8px;" data-i18n="search.tagsTitle">Tags disponibles</p>
    <div id="tags-cloud" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
</div>

<!-- Tabs -->
<div class="search-tabs">
    <button class="search-tab active" id="tab-recipes" onclick="switchTab('recipes')">
        <i class="fas fa-utensils"></i> <span data-i18n="search.tabRecipes">Recetas</span>
    </button>
    <button class="search-tab" id="tab-users" onclick="switchTab('users')">
        <i class="fas fa-users"></i> <span data-i18n="search.tabUsers">Usuarios</span>
    </button>
</div>

<div id="results-recipes" class="feed-container"></div>
<div id="results-users" style="display:none; padding: 0 16px 80px;"></div>

{% include 'bottom_bar.html' %}

<script>
let currentTab = 'recipes';

function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-recipes').classList.toggle('active', tab === 'recipes');
    document.getElementById('tab-users').classList.toggle('active', tab === 'users');
    document.getElementById('results-recipes').style.display = tab === 'recipes' ? '' : 'none';
    document.getElementById('results-users').style.display   = tab === 'users'   ? 'block' : 'none';
}

async function doSearch() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;
    saveToHistory(query);
    document.getElementById('search-history').style.display = 'none';
    // @ prefix → forzar tab de usuarios
    if (query.startsWith('@')) {
        switchTab('users');
        await searchUsers(query.slice(1));
        return;
    }
    await Promise.all([searchRecipes(query), searchUsers(query)]);
}

async function searchRecipes(query) {
    const res          = await fetch('/api/recipes/search');
    const publications = await res.json();
    const kw           = normalize(query);

    const results = publications.filter(pub => {
        const inTitle = normalize(pub.title || '').includes(kw);
        const inTags  = Array.isArray(pub.tags) && pub.tags.some(t => normalize(String(t)).includes(kw));
        const inIngr  = Array.isArray(pub.ingredients) && pub.ingredients.some(i => normalize(String(i)).includes(kw));
        return inTitle || inTags || inIngr;
    });

    const container = document.getElementById('results-recipes');
    container.innerHTML = '';

    if (results.length === 0) {
        container.innerHTML = `<p class="search-empty">${t("search.noRecipes")} "${query}".</p>`;
        return;
    }
    results.forEach(pub => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.innerHTML = `
            <img src="${pub.image}" class="recipe-img"
                 onerror="this.src='/storage/images/default_photo.jpg'">
            <div class="recipe-info">
                <h3>${pub.title}</h3>
                <div class="recipe-author">
                    <i class="fas fa-user-circle"></i> ${pub.author}
                </div>
            </div>`;
        card.onclick = () => window.location.href = '/publications/view/' + pub.id;
        container.appendChild(card);
    });
}

async function searchUsers(query) {
    if (!query || query.length < 2) return;
    const res   = await fetch(`/profiles/search?q=${encodeURIComponent(query)}`);
    const users = await res.json();

    const container = document.getElementById('results-users');
    container.innerHTML = '';

    if (users.length === 0) {
        container.innerHTML = `<p class="search-empty" style="text-align:center;padding-top:40px;">No hay usuarios para "${query}".</p>`;
        return;
    }
    users.forEach(u => {
        const card = document.createElement('div');
        card.className = 'user-card';
        card.onclick   = () => window.location.href = '/user/' + u.id;
        const stars    = '★'.repeat(Math.round(u.stars)) + '☆'.repeat(5 - Math.round(u.stars));
        card.innerHTML = `
            <img src="${u.profile_pic}" class="user-card-avatar"
                 onerror="this.src='/storage/images/default_user.jpg'">
            <div class="user-card-info">
                <div class="user-card-name">
                    ${u.username}
                    ${u.is_premium ? '<span class="premium-badge-sm">✨</span>' : ''}
                </div>
                <div class="user-card-stars">${stars} <span>${u.stars.toFixed(1)}</span></div>
            </div>
            <i class="fas fa-chevron-right" style="color:var(--text-muted);font-size:0.8rem;margin-left:auto;"></i>`;
        container.appendChild(card);
    });
}

function normalize(str) {
    return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

document.getElementById('search-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') doSearch();
});

const params = new URLSearchParams(window.location.search);
if (params.get('q')) {
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('search-input').value = params.get('q');
        doSearch();
    });
}

// ── Search History ─────────────────────────────────────────────
const HISTORY_KEY = 'trastevere_search_history';
const MAX_HISTORY = 8;

function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}
function saveToHistory(query) {
    let h = getHistory().filter(q => q.toLowerCase() !== query.toLowerCase());
    h.unshift(query);
    if (h.length > MAX_HISTORY) h = h.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}
function clearHistory() {
    localStorage.removeItem(HISTORY_KEY);
    document.getElementById('search-history').style.display = 'none';
}
function showHistory() {
    const input = document.getElementById('search-input').value.trim();
    const h = getHistory().filter(q => !input || q.toLowerCase().includes(input.toLowerCase()));
    const container = document.getElementById('search-history');
    const list = document.getElementById('history-list');
    if (!h.length) { container.style.display = 'none'; return; }
    list.innerHTML = h.map(q => `
        <div onclick="pickHistory('${q.replace(/'/g, "\'")}')"
             style="display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;
                    font-size:0.88rem;color:var(--text);transition:background 0.15s;"
             onmouseover="this.style.background='var(--primary-light)'"
             onmouseout="this.style.background=''">
            <i class="fas fa-clock" style="color:var(--text-muted);font-size:0.75rem;flex-shrink:0;"></i>
            <span style="flex:1;">${q}</span>
            <button onclick="event.stopPropagation();removeFromHistory('${q.replace(/'/g, "\'")}');"
                    style="background:none;border:none;color:#ccc;cursor:pointer;font-size:0.75rem;">✕</button>
        </div>`).join('');
    container.style.display = 'block';
}
function pickHistory(query) {
    document.getElementById('search-input').value = query;
    document.getElementById('search-history').style.display = 'none';
    doSearch();
}
function removeFromHistory(query) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(getHistory().filter(q => q !== query)));
    showHistory();
}
document.addEventListener('click', e => {
    const hero = document.querySelector('.search-hero');
    if (hero && !hero.contains(e.target))
        document.getElementById('search-history').style.display = 'none';
});

// ── Tags cloud ─────────────────────────────────────────────────
async function loadTags() {
    try {
        const res  = await fetch('/home/api/tags');
        const tags = await res.json();
        const cloud = document.getElementById('tags-cloud');
        if (!tags || tags.length === 0) {
            document.getElementById('tags-section').style.display = 'none';
            return;
        }
        cloud.innerHTML = tags.map(tag => `
            <span onclick="searchByTag('${tag}')"
                  style="display:inline-block;background:var(--primary-light);color:var(--primary);
                         border-radius:20px;padding:4px 12px;font-size:0.78rem;font-weight:600;
                         cursor:pointer;transition:all 0.15s;border:1px solid transparent;"
                  onmouseover="this.style.background='var(--primary)';this.style.color='white';"
                  onmouseout="this.style.background='var(--primary-light)';this.style.color='var(--primary)';">
                #${tag}
            </span>`).join('');
    } catch(e) {
        document.getElementById('tags-section').style.display = 'none';
    }
}
function searchByTag(tag) {
    document.getElementById('search-input').value = tag;
    switchTab('recipes');
    doSearch();
}
document.addEventListener('DOMContentLoaded', loadTags);
</script>

</body>
</html>
