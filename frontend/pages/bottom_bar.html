    <a href="/search" class="nav-item" title="Buscar">
        <i class="fa-solid fa-magnifying-glass"></i>

    <a href="/create" class="nav-item" title="Crear">
        <i class="fa-solid fa-plus-square"></i>

    </a>
    <a href="/profile" class="nav-item" title="Mi Perfil">
        <i class="fa-solid fa-user"></i>
    </a>
</nav>

<script>
    // Detectamos en qué página estamos
    const currentPath = window.location.pathname;
    
    // Buscamos todos los botones de la barra
    const navItems = document.querySelectorAll('.nav-item');

    navItems.forEach(item => {
        const linkPath = item.getAttribute('href');

        // Si la ruta coincide, le ponemos la clase active
        // Usamos una comparación sencilla para empezar
        if (currentPath === linkPath) {
            item.classList.add('active');
        } else {
            item.classList.remove('active');
        }
    });
</script>
